# Network Policies for Scenario 5: Agent-to-Agent Communication
# These policies define the allowed traffic between components and kubelet health checks

---
# Allow Trades API to receive traffic (from MCP, A2A, and kubelet health checks)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-to-trades
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades
  policyTypes:
    - Ingress
  ingress:
  # Allow health checks from kubelet (any source on health check port)
  - ports:
    - protocol: TCP
      port: 8080
---
# Allow MCP Server egress to Trades API (if MCP is deployed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-egress-to-trades
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades-mcp-server
  policyTypes:
    - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: trades
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
# Allow MCP Server ingress for health checks (if MCP is deployed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-server-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades-mcp-server
  policyTypes:
    - Ingress
  ingress:
  # Allow health checks from kubelet
  - ports:
    - protocol: TCP
      port: 8080
---
# Allow A2A Server to receive traffic from anywhere (external agents via port-forward + health checks)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-a2a-server-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades-a2a-server
  policyTypes:
    - Ingress
  ingress:
  # Allow all ingress (for port-forward and health checks)
  - {}
---
# Allow A2A Server egress to Trades API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-a2a-egress-to-trades
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades-a2a-server
  policyTypes:
    - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: trades
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
# Allow Trades API egress (for DNS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-trades-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades
  policyTypes:
    - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
