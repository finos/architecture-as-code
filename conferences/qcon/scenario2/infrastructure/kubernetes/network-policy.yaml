apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-to-trades
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades
  policyTypes:
    - Ingress
  ingress:
  # Allow health checks from kubelet (any source on health check port)
  - ports:
    - protocol: TCP
      port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-egress-to-trades
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades-mcp-server
  policyTypes:
    - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: trades
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mcp-server-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades-mcp-server
  policyTypes:
    - Ingress
  ingress:
  # Allow health checks from kubelet
  - ports:
    - protocol: TCP
      port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-trades-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: trades
  policyTypes:
    - Egress
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
