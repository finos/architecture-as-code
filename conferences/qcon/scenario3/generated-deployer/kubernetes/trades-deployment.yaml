apiVersion: apps/v1
kind: Deployment
metadata:
  name: trades
  labels:
    app: trades
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trades
  template:
    metadata:
      labels:
        app: trades
    spec:
      containers:
        - name: trades
          image: 
          imagePullPolicy: Never
          ports:
            - containerPort: 
          readinessProbe:
            httpGet:
              path: /trades
              port: 
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /trades
              port: 
            initialDelaySeconds: 10
            periodSeconds: 30
