<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1a1a2e"/>
  <!-- Central hexagon (architecture node) -->
  <polygon points="256,90 370,165 370,320 256,395 142,320 142,165"
    fill="none" stroke="#4f8ef7" stroke-width="18"/>
  <!-- Inner hexagon -->
  <polygon points="256,148 322,186 322,262 256,300 190,262 190,186"
    fill="#4f8ef7" opacity="0.15"/>
  <!-- Connection lines (architecture diagram aesthetic) -->
  <line x1="256" y1="90" x2="370" y2="165" stroke="#4f8ef7" stroke-width="4"/>
  <line x1="370" y1="165" x2="370" y2="320" stroke="#4f8ef7" stroke-width="4"/>
  <line x1="370" y1="320" x2="256" y2="395" stroke="#4f8ef7" stroke-width="4"/>
  <line x1="256" y1="395" x2="142" y2="320" stroke="#4f8ef7" stroke-width="4"/>
  <line x1="142" y1="320" x2="142" y2="165" stroke="#4f8ef7" stroke-width="4"/>
  <line x1="142" y1="165" x2="256" y2="90" stroke="#4f8ef7" stroke-width="4"/>
  <!-- Corner node dots -->
  <circle cx="256" cy="90" r="12" fill="#4f8ef7"/>
  <circle cx="370" cy="165" r="12" fill="#4f8ef7"/>
  <circle cx="370" cy="320" r="12" fill="#4f8ef7"/>
  <circle cx="256" cy="395" r="12" fill="#4f8ef7"/>
  <circle cx="142" cy="320" r="12" fill="#4f8ef7"/>
  <circle cx="142" cy="165" r="12" fill="#4f8ef7"/>
  <!-- Center dot -->
  <circle cx="256" cy="224" r="20" fill="#7eb8f7"/>
  <!-- "C" letterform hint -->
  <text x="256" y="234" font-family="sans-serif" font-size="28" font-weight="bold"
    fill="#1a1a2e" text-anchor="middle">C</text>
</svg>
