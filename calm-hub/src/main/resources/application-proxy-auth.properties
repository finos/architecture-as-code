quarkus.oidc.tenant-enabled=false
quarkus.oidc.enabled=false
# Header injected by the upstream proxy carrying the authenticated username (default: Remote-User)
#calm.security.proxy.username-header=Remote-User
# Force authentication on all CalmHub paths so ProxyAuthenticationMechanism populates
# the SecurityIdentity before @PermissionsAllowed is checked.
quarkus.http.auth.permission.secured.paths=/calm/*
quarkus.http.auth.permission.secured.policy=authenticated
quarkus.http.auth.permission.mcp-tools.paths=/mcp/*
quarkus.http.auth.permission.mcp-tools.policy=authenticated
#quarkus.log.level=DEBUG