quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Calm Hub
#If using in quarkus dev mode can be 'mongo' or 'standalone'
calm.database.mode=mongo
# Base URL used to verify and rewrite $id in POST bodies to the name-based API.
# When unset, $id verification is skipped (developer-friendly default).
# calm.hub.base-url=http://localhost:8080
# Standalone mode configuration
calm.standalone.data-directory=${user.home}/.calm-hub/data
calm.standalone.database-name=calmSchemas
calm.standalone.username=admin
calm.standalone.password=admin
calm.standalone.init-script-path=mongo/init-mongo.js
# Read-only mode: when true, opens Nitrite with readOnly(true) and rejects mutating HTTP verbs
calm.readonly=false
quarkus.mongodb.connection-string = mongodb://localhost:27017
quarkus.mongodb.database = calmSchemas

# Standalone profile: activates NitriteDB mode and suppresses MongoDB health-check
# and dev-services so Quarkus does not spin up a MongoDB container or report the
# MongoDB health indicator as failing. The connection string and database name are
# intentionally kept at their default values — the Quarkus MongoDB extension requires
# a non-empty database name and creating a MongoClient config is harmless: all Mongo
# CDI beans are gated by @LookupIfProperty(calm.database.mode=mongo) so the client is
# never actually used in standalone mode.
%standalone.calm.database.mode=standalone
%standalone.quarkus.mongodb.health.enabled=false
%standalone.quarkus.mongodb.devservices.enabled=false
# Standalone is a local-dev mode — disable auth so it works without an IdP.
%standalone.calm.auth.enabled=false
# Suppress noisy "Connection refused" log spam from the MongoDB driver background
# monitor threads — the MongoClient is created by the Quarkus extension but never
# used in standalone mode (all Mongo CDI beans are @LookupIfProperty-gated).
%standalone.quarkus.log.category."org.mongodb.driver.cluster".level=ERROR
%standalone.quarkus.log.category."org.mongodb.driver.client".level=ERROR
%standalone.quarkus.log.category."org.mongodb.driver.connection".level=ERROR

#Disable creating the keycloak container for default profile.
quarkus.oidc.enabled=true
quarkus.keycloak.devservices.enabled=false
quarkus.oidc.tenant-enabled=false

# Default profile is secure — no authentication mechanism is wired, so all requests
# are rejected with 401. Explicitly activate a profile to enable access:
#   no-auth     — open access for local development/testing (no IdP needed)
#   secure      — JWT/OIDC via Keycloak
#   proxy-auth  — identity injected by an upstream proxy
calm.auth.enabled=true

#quarkus.http.port=8081

# Security response headers — applied to all routes
quarkus.http.filter.security.matches=/.*
quarkus.http.filter.security.methods=GET,POST,PUT,DELETE,PATCH
quarkus.http.filter.security.header."X-Frame-Options"=DENY

# MCP Server Configuration (experimental)
# Gates MCP tool invocations. When false (the default), every @Tool method
# returns a disabled error; the /mcp HTTP endpoint itself remains reachable.
# Defaults to false. Override at runtime with -Dcalm.mcp.enabled=true or the
# environment variable CALM_MCP_ENABLED=true to enable all MCP tools.
calm.mcp.enabled=false
# Log every JSON-RPC message in dev mode for easier debugging of MCP clients.
%dev.quarkus.mcp.server.traffic-logging=true
quarkus.log.category."org.finos.calm".level=DEBUG
quarkus.log.category."org.mongodb.driver".level=OFF