name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    # Skip Dependabot PRs — Semgrep CE cannot access secrets in fork PRs
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        # --config auto: uses Semgrep registry rules matched to detected languages
        # --error: exits non-zero only on error-severity findings (block on errors only, per locked decision)
        # Community Edition — no SEMGREP_APP_TOKEN required for open-source repos
        run: semgrep scan --config auto --error --exclude='skills/' --exclude='docs/'
