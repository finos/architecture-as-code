name: Docker Publish Calm Hub

permissions:
    contents: read

on:
    push:
        branches:
            - main
        paths:
            - 'calm-hub/**'
            - 'calm-hub-ui/**'
            - '.github/workflows/docker-publish-calm-hub.yml'
    # Manual trigger from GitHub UI (allows custom tag)
    workflow_dispatch:
        inputs:
            tag:
                description: 'Image tag (default: latest)'
                required: false
                default: 'latest'

concurrency:
    group: docker-publish-calm-hub
    cancel-in-progress: false

jobs:
    build-and-push:
        name: Build and Push Multi-Arch Docker Image
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout the repository
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            # Step 2: Set up JDK
            - name: Set up JDK
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
              with:
                  distribution: 'temurin'
                  java-version: '21'

            # Step 3: Cache Maven Dependencies
            - name: Cache Maven Dependencies
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('calm-hub/pom.xml') }}
                  restore-keys: |
                      ${{ runner.os }}-m2-

            # Step 4: Build the application with Maven
            - name: Build with Maven
              working-directory: calm-hub
              run: mvn -P integration clean package -Ddependency-check.skip=true

            # Step 5: Set up Docker Buildx for multi-architecture builds
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            # Step 6: Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # Step 7: Extract metadata for Docker
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ secrets.DOCKER_USERNAME }}/calm-hub
                  tags: |
                      type=raw,value=${{ github.event.inputs.tag || 'latest' }}
                      type=sha,format=short
                      type=ref,event=branch
                      type=ref,event=tag

            # Step 8: Smoke test — build a local linux/amd64 image and verify the API
            # contract before pushing to the registry.  A transient MongoDB container
            # is started on a private Docker network so the app can connect.  The test
            # asserts: GET /api/calm/namespaces -> 200 and POST /api/calm/namespaces -> 201
            # (writes enabled; this is the writable MongoDB-backed JVM image).
            # Auth is disabled for the smoke test (the prod image defaults to auth-on).
            # The cache-to here primes the GHA layer cache so the multi-arch push
            # below is a cache hit for the amd64 layer.
            - name: Build image for smoke test
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: calm-hub
                  file: calm-hub/src/main/docker/Dockerfile.jvm
                  platforms: linux/amd64
                  load: true
                  tags: calm-hub:smoke
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Smoke test
              run: |
                  docker network create smoke-net
                  docker run -d --name mongo --network smoke-net mongo:8
                  docker run -d --name calmhub --network smoke-net \
                    -p 8080:8080 \
                    -e QUARKUS_MONGODB_CONNECTION_STRING=mongodb://mongo:27017 \
                    -e CALM_AUTH_ENABLED=false \
                    -e QUARKUS_OIDC_TENANT_ENABLED=false \
                    calm-hub:smoke
                  bash calm-hub/smoke-test.sh http://localhost:8080 readwrite

            - name: Dump container logs on failure
              if: failure()
              run: docker logs calmhub 2>/dev/null || true

            - name: Cleanup smoke test containers
              if: always()
              run: |
                  docker rm -f calmhub mongo 2>/dev/null || true
                  docker network rm smoke-net 2>/dev/null || true

            # Step 9: Build and push Docker image
            - name: Build and push
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: calm-hub
                  file: calm-hub/src/main/docker/Dockerfile.jvm
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
