name: Build CALM Guard

permissions:
    contents: read

on:
    pull_request:
        branches:
            - 'main'
            - 'release*'
        paths:
            - 'calm-guard/**'
            - '.github/workflows/build-calm-guard.yml'
            - 'package.json'
            - 'package-lock.json'
    push:
        branches:
            - 'main'
            - 'release*'
        paths:
            - 'calm-guard/**'
            - '.github/workflows/build-calm-guard.yml'
            - 'package.json'
            - 'package-lock.json'

jobs:
    lint:
        name: Lint & Typecheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint --workspace=calmguard

            - name: Typecheck
              run: npm run typecheck --workspace=calmguard

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm run test:run --workspace=calmguard

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: test
        env:
            NEXT_SKIP_VALIDATE: "1"
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version-file: '.nvmrc'
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build --workspace=calmguard
