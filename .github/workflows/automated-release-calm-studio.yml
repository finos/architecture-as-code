name: CALM Studio - Automated Release

concurrency:
    group: calm-studio-release
    cancel-in-progress: false

permissions:
    contents: write
    issues: write
    pull-requests: write

on:
    push:
        branches:
            - main
        paths:
            - 'calm-suite/calm-studio/**'
    workflow_dispatch:

defaults:
    run:
        working-directory: calm-suite/calm-studio

jobs:
    release:
        name: Multi-Package Semantic Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 22
                  cache: pnpm
                  cache-dependency-path: calm-suite/calm-studio/pnpm-lock.yaml
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm -r run build

            - name: Release
              run: pnpm dlx multi-semantic-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
