name: Docker Publish Calm Hub (Read-Only Static)

permissions:
    contents: read

on:
    push:
        branches:
            - main
        paths:
            - 'calm-hub/**'
            - 'calm/**'
            - '.github/workflows/docker-publish-calm-hub-readonly.yml'
    # Manual trigger from GitHub UI (allows custom tag)
    workflow_dispatch:
        inputs:
            tag:
                description: 'Image tag (default: latest-read-only-static)'
                required: false
                default: 'latest-read-only-static'

concurrency:
    group: docker-publish-calm-hub-readonly
    cancel-in-progress: false

jobs:
    build-and-push:
        name: Build and Push Read-Only Static Docker Image
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout the full repository (calm/ schemas are outside calm-hub/)
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            # Step 2: Set up JDK
            - name: Set up JDK
              uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
              with:
                  distribution: 'temurin'
                  java-version: '21'

            # Step 3: Cache Maven Dependencies
            - name: Cache Maven Dependencies
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('calm-hub/pom.xml') }}
                  restore-keys: |
                      ${{ runner.os }}-m2-

            # Step 4: Build application and stage seed content via the shared script.
            # --no-docker: skip the local docker build; this workflow uses buildx below
            # for a multi-arch push.  The same script is used for local builds.
            - name: Build and stage seed content
              run: bash calm-hub/build-readonly-image.sh --no-docker

            # Step 5: Set up Docker Buildx for multi-architecture builds
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            # Step 6: Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            # Step 7: Extract metadata for Docker
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
              with:
                  images: ${{ secrets.DOCKER_USERNAME }}/calm-hub
                  tags: |
                      type=raw,value=${{ github.event.inputs.tag || 'latest-read-only-static' }}
                      type=sha,format=short,suffix=-read-only-static
                      type=ref,event=tag,suffix=-read-only-static

            # Step 8: Smoke test — build a local linux/amd64 image and verify the API
            # contract before pushing to the registry.  The image is self-contained
            # (NitriteDB baked in, CALM_READONLY=true), so no external services are
            # needed.  The test asserts: GET /api/calm/namespaces -> 200 (reads work on
            # seeded data) and mutating verbs -> 405 on both /api/calm/... and /calm
            # (ReadOnlyRequestFilter).  Auth is disabled by the standalone profile baked
            # into this image (QUARKUS_PROFILE=standalone).
            # The cache-to here primes the GHA layer cache so the multi-arch push
            # below is a cache hit for the amd64 layer.
            - name: Build image for smoke test
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: calm-hub
                  file: calm-hub/src/main/docker/Dockerfile.readonly-static
                  platforms: linux/amd64
                  load: true
                  tags: calm-hub:smoke
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Smoke test
              run: |
                  docker run -d --name calmhub -p 8080:8080 calm-hub:smoke
                  bash calm-hub/smoke-test.sh http://localhost:8080 readonly

            - name: Dump container logs on failure
              if: failure()
              run: docker logs calmhub 2>/dev/null || true

            - name: Cleanup smoke test container
              if: always()
              run: docker rm -f calmhub 2>/dev/null || true

            # Step 9: Build and push the read-only static image.
            # The seed stage (Stage 1) is pinned to linux/amd64 in the Dockerfile so it
            # runs natively on this runner.  The final stage is built for all platforms;
            # the .db file is architecture-neutral (H2 MVStore / pure-Java format).
            - name: Build and push
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
              with:
                  context: calm-hub
                  file: calm-hub/src/main/docker/Dockerfile.readonly-static
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
