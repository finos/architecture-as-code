name: Build Calm Hub with Integration Tests and Coverage

permissions:
    contents: read

on:
    pull_request:
        branches:
            - 'main'
            - 'release*'
    push:
        branches:
            - 'main'
            - 'release*'

jobs:
    build:
        name: Build Calm Hub
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout PR Branch
            - name: Checkout PR Branch
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            # Step 2: Set up JDK
            - name: Set up JDK
              uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
              with:
                  distribution: 'temurin'
                  java-version: '21'

            # Step 3: Cache Maven Dependencies
            - name: Cache Maven Dependencies
              uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
              with:
                  path: ~/.m2
                  key: ${{ runner.os }}-m2-${{ hashFiles('calm-hub/pom.xml') }}
                  restore-keys: |
                      ${{ runner.os }}-m2-

            # Step 4: Set up Docker (Required for Testcontainers)
            - name: Set up Docker
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            # Step 5: Build and Test
            - name: Build and Test
              working-directory: calm-hub
              run: mvn -P integration clean verify -Ddependency-check.skip=true
