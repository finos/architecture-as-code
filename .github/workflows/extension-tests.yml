name: Build Extensions Module ( calm-validate )

on:
  pull_request:
    branches:
      - "main"
    paths:
      - "calm-validate/**"
  push:
    branches:
      - "main"
    paths:
      - "calm-validate/**"

defaults:
  run:
    working-directory: ./calm-validate

jobs:
  calm-validate-extension-tests:
    name: Run unit tests and lint on the calm-validate module.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: v20
      - run: npm ci
      - run: npm run test
